<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup 2026 — Schedule Viewer</title>
    <meta
      name="description"
      content="All 104 matches of the 2026 FIFA World Cup in your timezone — live scores, group standings, knockout bracket, and how to watch (US)."
    />
    <meta name="theme-color" content="#0f1420" />
    <link rel="canonical" href="https://world-cup-viewer.netlify.app/" />

    <!-- Open Graph (link previews in Slack/Discord/iMessage/Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="World Cup 2026 Schedule Viewer" />
    <meta property="og:title" content="World Cup 2026 — Schedule Viewer" />
    <meta
      property="og:description"
      content="All 104 matches in your timezone — live scores, standings, bracket, and how to watch."
    />
    <meta property="og:url" content="https://world-cup-viewer.netlify.app/" />
    <meta property="og:image" content="https://world-cup-viewer.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="World Cup 2026 Schedule Viewer" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="World Cup 2026 — Schedule Viewer" />
    <meta
      name="twitter:description"
      content="All 104 matches in your timezone — live scores, standings, bracket, and how to watch."
    />
    <meta name="twitter:image" content="https://world-cup-viewer.netlify.app/og-image.png" />
    <script>
      // Set the theme before paint to avoid a flash of the wrong palette.
      (function () {
        try {
          var t = localStorage.getItem('wc2026:theme')
          if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          document.documentElement.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
