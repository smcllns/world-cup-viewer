<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup Tracker 2026 — scores, schedule &amp; bracket</title>
    <meta
      name="description"
      content="Track all 104 matches of the 2026 FIFA World Cup (USA · Canada · Mexico) in your timezone — live scores, group standings, and the full knockout bracket."
    />
    <meta name="theme-color" content="#0f1420" />
    <link rel="canonical" href="https://worldcuptracker.win/" />

    <!-- Display typeface: Archivo (confident grotesque, sports-broadcast feel) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- PWA: installable to home screen, standalone launch -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="World Cup Tracker" />

    <!-- Open Graph (link previews in Slack/Discord/iMessage/Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="World Cup Tracker 2026" />
    <meta property="og:title" content="World Cup Tracker 2026" />
    <meta
      property="og:description"
      content="Every match, score &amp; the full knockout bracket — in your timezone."
    />
    <meta property="og:url" content="https://worldcuptracker.win/" />
    <meta property="og:image" content="https://worldcuptracker.win/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="World Cup Tracker 2026" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="World Cup Tracker 2026" />
    <meta
      name="twitter:description"
      content="Every match, score &amp; the full knockout bracket — in your timezone."
    />
    <meta name="twitter:image" content="https://worldcuptracker.win/og-image.jpg" />
    <script>
      // Set the theme before paint to avoid a flash of the wrong palette.
      (function () {
        try {
          var t = localStorage.getItem('wc2026:theme')
          if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          document.documentElement.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
