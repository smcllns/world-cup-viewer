name: Daily schedule check

# Each morning, well before the day's earliest kickoff, validate our stored
# kickoff times against FIFA's official data (the authority) plus ESPN,
# TheSportsDB and OpenFootball (corroboration) for every group match. If FIFA
# disagrees, this:
#   1. emails the change (Gmail), and
#   2. auto-fixes both files (matches.js + the kickoff fixture) and opens a
#      ready-to-merge PR — so you review & merge, never hand-edit or adjudicate.
# feed-freshness.yml runs the same check hourly as a red-build backstop.
#
# Timing: 12:00 UTC = 05:00 America/Phoenix (MST, UTC-7 year-round); the earliest
# group games kick off at 12:00 ET (09:00 MST). GitHub's scheduler can lag — fine
# for a daily review. Node built-ins only (no npm ci).
#
# Secrets: MAIL_USERNAME + MAIL_PASSWORD (Gmail App Password) for the email.

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write # push the auto-fix branch
  pull-requests: write # open the PR

jobs:
  check:
    name: Validate kickoff times vs FIFA
    runs-on: ubuntu-latest
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO: chester.ismay@gmail.com
      SCHEDULE_REPORT_ONLY: '1' # email + stay green (the PR is the action, not a red build)
      SCHEDULE_AUTOFIX: '1' # rewrite the two files to FIFA's time for any drift
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # Emails any change and, in autofix mode, edits matches.js + the fixture.
      - run: node scripts/check-schedule-drift.mjs

      # If the schedule files changed, open (or update) a ready-to-merge PR.
      - name: Open auto-fix PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain src/data/matches.js test/fixtures/official-kickoffs.js)" ]; then
            echo "No schedule changes — nothing to PR."
            exit 0
          fi
          BRANCH=auto/kickoff-fix
          git config user.name "wc-schedule-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/data/matches.js test/fixtures/official-kickoffs.js
          git commit -m "Auto-fix kickoff time(s) to match FIFA's official schedule"
          git push -f origin "$BRANCH"
          if [ -n "$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')" ]; then
            echo "An open PR already tracks $BRANCH — force-push updated it."
          else
            gh pr create --base main --head "$BRANCH" \
              --title "Auto-fix: kickoff time(s) changed per FIFA" \
              --body "FIFA's official schedule no longer matches our stored kickoff time(s). This PR updates \`src/data/matches.js\` and \`test/fixtures/official-kickoffs.js\` to FIFA's time (the \`data.test.js\` invariant asserts the two agree). Generated by the daily schedule check — please verify against FIFA and merge.

