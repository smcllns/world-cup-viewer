name: OpenFootball autofill

# Syncs confirmed final scores to openfootball/worldcup (2026--usa/cup.txt) — but
# only while matches are finishing, not around the clock. A scheduled run loops
# every ~5 minutes ONLY when "now" is inside a match's finishing window (late
# second half through post-match source confirmation, see scripts/active-window.mjs);
# outside those windows it checks and exits in seconds.
#
# Why this shape: GitHub throttles frequent (*/5) cron schedules heavily, so a
# fixed 5-min schedule is unreliable. Instead a coarser */15 trigger spins the job
# up, and because each match window is ~95 min long, at least one trigger reliably
# lands inside it even when GitHub drops some; the job then self-loops at 5-min
# cadence through the window. The concurrency group serializes scheduled runs, so
# when one job hits its ~55-min budget a queued one takes over with no gap.
#
# The scripts use only Node built-ins + repo source (no npm packages), so there's
# no `npm ci` — keeping the frequent idle checks cheap. Email is sent in-script
# (Gmail SMTP via python3) so it fires per-iteration inside the loop.
#
# Secrets: OF_PUSH_TOKEN (push to openfootball/worldcup) — without it, dry-run.
# MAIL_USERNAME + MAIL_PASSWORD (Gmail App Password) for notifications — optional.

on:
  schedule:
    - cron: '*/15 * * * *' # coarse; the in-job window gate decides when to actually loop
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only (no push)'
        type: boolean
        default: false
      test_email:
        description: 'Send a test notification email and exit'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write # open a manual-review issue when a knockout can't be auto-synced

concurrency:
  group: openfootball-autofill-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  autofill:
    name: Sync confirmed finals upstream
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OF_PUSH_TOKEN: ${{ secrets.OF_PUSH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # opens manual-review issues in THIS repo
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO: chester.ismay@gmail.com
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Manual: send a test email and stop.
      - name: Test email
        if: ${{ inputs.test_email }}
        run: TEST_EMAIL=1 node scripts/openfootball-autofill.mjs

      # Manual: run the sync once now, ignoring the match-time window.
      - name: Sync once (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.test_email }}
        run: node scripts/openfootball-autofill.mjs
        env:
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}

      # Scheduled: loop at ~5-min cadence, but only inside a match window.
      - name: Sync loop (match windows only)
        if: ${{ github.event_name == 'schedule' }}
        run: |
          DEADLINE=$((SECONDS + 3300)) # ~55 min, then a fresh trigger takes over
          while [ $SECONDS -lt $DEADLINE ]; do
            set -- $(node scripts/active-window.mjs)
            STATE=$1; SECS=$2
            if [ "$STATE" = "ACTIVE" ]; then
              node scripts/openfootball-autofill.mjs || true
              sleep 270
            elif [ "$STATE" = "IDLE" ] && [ "${SECS:-0}" -ge 0 ] && [ "${SECS:-0}" -le 600 ]; then
              echo "Match window starts in ${SECS}s — waiting."
              sleep $((SECS + 5))
            else
              echo "No active or imminent match window (next in ${SECS:-?}s). Exiting."
              break
            fi
          done
