name: OpenFootball autofill

# Syncs confirmed final scores to openfootball/worldcup (2026--usa/cup.txt) — but
# only while matches are finishing, not around the clock. A scheduled run loops
# every ~5 minutes ONLY when "now" is inside a match's finishing window (late
# second half through post-match source confirmation, see scripts/active-window.mjs);
# outside those windows it checks and exits in seconds.
#
# Why this shape: GitHub throttles frequent (*/5) cron schedules heavily, so a
# fixed 5-min schedule is unreliable. Instead a coarser */15 trigger spins the job
# up, and because each match window is ~95 min long, at least one trigger reliably
# lands inside it even when GitHub drops some; the job then self-loops at 5-min
# cadence through the window. The concurrency group serializes scheduled runs, so
# when one job hits its ~55-min budget a queued one takes over with no gap.
#
# The scripts use only Node built-ins + repo source (no npm packages), so there's
# no `npm ci` — keeping the frequent idle checks cheap. Email is sent in-script
# (Gmail SMTP via python3) so it fires per-iteration inside the loop.
#
# Secrets: OF_PUSH_TOKEN (push to openfootball/worldcup) — without it, dry-run.
# MAIL_USERNAME + MAIL_PASSWORD (Gmail App Password) for notifications — optional.

on:
  schedule:
    - cron: '*/15 * * * *' # coarse; the in-job window gate decides when to actually loop
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only (no push)'
        type: boolean
        default: false
      test_email:
        description: 'Send a test notification email and exit'
        type: boolean
        default: false
      babysit:
        description: 'Run a long sleep-until-window loop now (covers upcoming match windows for up to ~5h)'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write # open a manual-review issue when a knockout can't be auto-synced

# Long "loop" runs (the schedule and the babysit chain) share ONE group so only
# one polls at a time and the re-dispatch chain never doubles up. Quick manual
# runs (test email / one-off sync) get a unique group so they never wait behind a
# multi-hour loop.
concurrency:
  group: >-
    ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.babysit))
        && 'openfootball-autofill-loop'
        || format('openfootball-autofill-once-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  autofill:
    name: Sync confirmed finals upstream
    runs-on: ubuntu-latest
    timeout-minutes: 350 # the loop may sleep until an upcoming window (up to ~5h)
    env:
      OF_PUSH_TOKEN: ${{ secrets.OF_PUSH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # opens manual-review issues in THIS repo
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO: chester.ismay@gmail.com
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Manual: send a test email and stop.
      - name: Test email
        if: ${{ inputs.test_email }}
        run: TEST_EMAIL=1 node scripts/openfootball-autofill.mjs

      # Manual: run the sync once now, ignoring the match-time window.
      - name: Sync once (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.test_email && !inputs.babysit }}
        run: node scripts/openfootball-autofill.mjs
        env:
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}

      # Scheduled (or a manual "babysit" dispatch): a resilient loop that SLEEPS
      # until the next match window (up to a ~5h budget), then polls every ~5 min
      # through it, then moves to the next. Because the job sleeps to the window
      # rather than needing a trigger to land inside it, a single sparse schedule
      # firing still covers upcoming games — GitHub only has to fire once every
      # few hours, not once inside each 95-min window.
      - name: Sync loop (sleep-until-window)
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.babysit) }}
        run: |
          DEADLINE=$((SECONDS + 18000)) # ~5h budget (job timeout is 350 min)
          while [ $SECONDS -lt $DEADLINE ]; do
            set -- $(node scripts/active-window.mjs)
            STATE=${1:-}; SECS=${2:-}
            if [ "$STATE" = "ACTIVE" ]; then
              node scripts/openfootball-autofill.mjs || true
              sleep 270
            elif [ "$STATE" = "IDLE" ] && [ -n "$SECS" ] && [ "$SECS" -ge 0 ]; then
              REM=$((DEADLINE - SECONDS))
              if [ "$SECS" -ge "$REM" ]; then
                echo "Next match window in ${SECS}s — beyond this job's budget. Exiting."
                break
              fi
              echo "Idle — sleeping ${SECS}s until the next match window."
              sleep $((SECS + 5))
            else
              echo "No upcoming match windows. Exiting."
              break
            fi
          done

      # Self-perpetuating chain: GitHub's scheduler is too sparse to rely on (it
      # fires ~once every 2h), so a loop run re-dispatches the next one itself as
      # long as another window is within reach — making coverage independent of the
      # scheduler during a match day. It rests during long overnight gaps; the */15
      # schedule is the backstop that restarts the chain before the next day's games.
      - name: Keep coverage continuous (re-dispatch if another window is near)
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.babysit) }}
        env:
          GH_TOKEN: ${{ secrets.OF_PUSH_TOKEN }}
        run: |
          set -- $(node scripts/active-window.mjs)
          STATE=${1:-}; SECS=${2:-}
          if [ "$STATE" = "ACTIVE" ] || { [ "$STATE" = "IDLE" ] && [ -n "$SECS" ] && [ "$SECS" -ge 0 ] && [ "$SECS" -le 19800 ]; }; then
            echo "Another window within ~5.5h — re-dispatching the loop to continue coverage."
            gh workflow run "OpenFootball autofill" -f babysit=true \
              || echo "Re-dispatch failed; the schedule backstop will recover."
          else
            echo "No window within ~5.5h — resting; the schedule restarts the loop before the next match day."
          fi
